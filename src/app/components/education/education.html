<section id="education" class="py-24 scroll-mt-16 bg-slate-900">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="text-center mb-16">
      <p class="text-indigo-400 font-mono text-sm tracking-widest uppercase mb-2">Academic Background</p>
      <h2 class="text-3xl md:text-4xl font-bold text-white">
        <span class="text-indigo-400">Education</span>
      </h2>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      @for (edu of portfolio.educations; track edu.degree + edu.period; let i = $index) {
        <div class="group relative bg-slate-800/60 rounded-2xl border border-slate-700/60
                    hover:border-indigo-500/40 transition-all duration-300 hover:-translate-y-1
                    overflow-hidden flex flex-col">
          <!-- Top accent bar -->
          <div class="h-1 w-full bg-linear-to-r from-indigo-500 to-purple-500 opacity-30 group-hover:opacity-100 transition-opacity duration-300"></div>

          <div class="p-6 flex flex-col flex-1">
            <!-- Icon -->
            <div class="w-12 h-12 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-center mb-5 group-hover:bg-indigo-500/20 transition-colors">
              <svg class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m-4-3.5l4 2 4-2"/>
              </svg>
            </div>

            <!-- Degree -->
            <span class="inline-block self-start px-2.5 py-0.5 bg-indigo-500/10 text-indigo-400 text-xs rounded-full border border-indigo-500/20 font-medium mb-3">
              {{ edu.degree }}
            </span>

            <!-- Field & Institution -->
            <h3 class="text-white font-semibold text-base leading-snug mb-1">{{ edu.field }}</h3>
            <p class="text-gray-400 text-sm leading-relaxed flex-1">{{ edu.institution }}</p>

            <!-- Divider -->
            <div class="h-px bg-slate-700/50 my-4"></div>

            <!-- Period & GPA -->
            <div class="flex items-center justify-between">
              <span class="text-gray-500 text-xs font-mono">{{ edu.period }}</span>
              <div class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
                <span class="text-amber-400 text-xs font-semibold">GPA {{ edu.gpa }}</span>
              </div>
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
