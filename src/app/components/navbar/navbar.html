<nav [ngClass]="isScrolled() ? 'bg-slate-900/95 backdrop-blur shadow-lg' : 'bg-transparent'"
     class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a [routerLink]="['/']" class="text-xl font-bold text-indigo-400 font-mono">
        &lt;{{ portfolio.displayName }} /&gt;
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-8">
        @for (link of navLinks; track link.fragment) {
          <a [routerLink]="['/']" [fragment]="link.fragment"
             class="text-gray-300 hover:text-indigo-400 transition-colors duration-200 text-sm font-medium">
            {{ link.label }}
          </a>
        }
        <a [href]="portfolio.emailHref"
           class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium transition-colors duration-200">
          Hire Me
        </a>
      </div>

      <!-- Mobile Menu Button -->
      <button (click)="toggleMenu()" class="md:hidden text-gray-300 hover:text-white" aria-label="Toggle menu">
        @if (isMenuOpen()) {
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <div class="md:hidden bg-slate-900/95 backdrop-blur border-t border-slate-800">
      <div class="px-4 py-4 flex flex-col gap-4">
        @for (link of navLinks; track link.fragment) {
          <a [routerLink]="['/']" [fragment]="link.fragment"
             (click)="closeMenu()"
             class="text-gray-300 hover:text-indigo-400 transition-colors py-1 text-sm font-medium">
            {{ link.label }}
          </a>
        }
        <a [href]="portfolio.emailHref"
           class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium text-center transition-colors">
          Hire Me
        </a>
      </div>
    </div>
  }
</nav>
