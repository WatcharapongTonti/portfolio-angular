<section id="about" class="py-24 scroll-mt-16 bg-slate-800/40">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section heading -->
    <div class="text-center mb-16">
      <p class="text-indigo-400 font-mono text-sm tracking-widest uppercase mb-2">Who I am</p>
      <h2 class="text-3xl md:text-4xl font-bold text-white">
        About <span class="text-indigo-400">Me</span>
      </h2>
    </div>

    <div class="grid md:grid-cols-2 gap-16 items-center">
      <!-- Avatar -->
      <div class="flex justify-center">
        <div class="relative">
          <!-- Gradient ring -->
          <div class="w-64 h-64 rounded-3xl p-[3px]"
               style="background: linear-gradient(135deg, #6366f1, #8b5cf6, #6366f1);">
            <div class="w-full h-full rounded-3xl overflow-hidden">
              @if (imgError) {
                <div class="w-full h-full bg-slate-900 flex items-center justify-center">
                  <div class="text-6xl font-bold text-transparent bg-clip-text"
                       style="background: linear-gradient(135deg, #a5b4fc, #818cf8); -webkit-background-clip: text;">
                    {{ portfolio.initials }}
                  </div>
                </div>
              } @else {
                <img [src]="portfolio.avatarUrl" [alt]="portfolio.name"
                     class="w-full h-full object-cover object-top"
                     (error)="imgError = true">
              }
            </div>
          </div>
          <!-- Floating badge -->
          <div class="absolute -bottom-4 -right-4 bg-indigo-600 rounded-2xl px-4 py-2 shadow-lg shadow-indigo-600/30">
            <div class="text-white text-xs font-semibold">{{ portfolio.yearsOfExperience }}+ Years Exp.</div>
          </div>
        </div>
      </div>

      <!-- Bio -->
      <div class="space-y-6">
        <p class="text-gray-300 text-lg leading-relaxed" style="white-space: pre-line">
          {{ portfolio.aboutDescription }}
        </p>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 pt-2">
          @for (stat of portfolio.stats; track stat.label) {
            <div class="group text-center p-4 bg-slate-900/80 rounded-2xl border border-slate-700/80 hover:border-indigo-500/50 transition-colors">
              <div class="text-2xl font-bold text-indigo-400 group-hover:scale-110 transition-transform inline-block">
                {{ stat.value }}
              </div>
              <div class="text-gray-500 text-xs mt-1 leading-tight">{{ stat.label }}</div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
