<section id="hero" class="min-h-screen flex items-center justify-center bg-slate-900 relative overflow-hidden">
  <!-- Grid background -->
  <div class="absolute inset-0 pointer-events-none"
       style="background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px); background-size: 48px 48px;"></div>

  <!-- Blobs -->
  <div class="absolute top-1/4 -left-20 w-96 h-96 bg-indigo-600/15 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-purple-600/15 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative z-10 text-center max-w-4xl mx-auto px-4 pt-20">
    <!-- Open to work badge -->
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-emerald-400 text-sm font-medium mb-8">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
      Available for work
    </div>

    <!-- Greeting -->
    <p class="text-gray-400 text-base font-mono mb-3 tracking-widest uppercase">Hello, I'm</p>

    <!-- Name with gradient -->
    <h1 class="text-5xl md:text-7xl font-bold mb-4 leading-tight"
        style="background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
      {{ portfolio.name }}
    </h1>

    <h2 class="text-2xl md:text-3xl font-semibold text-indigo-400 mb-6">
      {{ portfolio.title }}
    </h2>

    <p class="text-gray-400 text-lg max-w-2xl mx-auto mb-10 leading-relaxed">
      {{ portfolio.bio }}
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
      <a [routerLink]="['/']" fragment="projects"
         class="group inline-flex items-center justify-center gap-2 px-8 py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold transition-all duration-200 shadow-lg shadow-indigo-600/25 hover:shadow-indigo-500/40 hover:-translate-y-0.5">
        View Projects
        <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
      <a [routerLink]="['/']" fragment="contact"
         class="inline-flex items-center justify-center gap-2 px-8 py-3.5 border border-slate-600 hover:border-indigo-500 text-gray-300 hover:text-indigo-400 rounded-xl font-semibold transition-all duration-200 hover:-translate-y-0.5">
        Contact Me
      </a>
    </div>

    <!-- Social Links -->
    <div class="flex justify-center gap-4">
      <a [href]="portfolio.github.url" target="_blank" rel="noopener noreferrer"
         class="w-11 h-11 flex items-center justify-center rounded-xl border border-slate-700 text-gray-400 hover:text-white hover:border-indigo-500 hover:bg-indigo-500/10 transition-all duration-200" aria-label="GitHub">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.929.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
      <a [href]="portfolio.linkedin.url" target="_blank" rel="noopener noreferrer"
         class="w-11 h-11 flex items-center justify-center rounded-xl border border-slate-700 text-gray-400 hover:text-white hover:border-indigo-500 hover:bg-indigo-500/10 transition-all duration-200" aria-label="LinkedIn">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
      <a [href]="portfolio.emailHref"
         class="w-11 h-11 flex items-center justify-center rounded-xl border border-slate-700 text-gray-400 hover:text-white hover:border-indigo-500 hover:bg-indigo-500/10 transition-all duration-200" aria-label="Email">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </a>
    </div>

    <!-- Scroll indicator -->
    <div class="mt-16 flex justify-center animate-bounce">
      <a [routerLink]="['/']" fragment="about" class="text-slate-600 hover:text-slate-500 transition-colors">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </a>
    </div>
  </div>
</section>
