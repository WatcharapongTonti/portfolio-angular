<section id="skills" class="py-24 scroll-mt-16 bg-slate-900">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="text-center mb-16">
      <p class="text-indigo-400 font-mono text-sm tracking-widest uppercase mb-2">What I use</p>
      <h2 class="text-3xl md:text-4xl font-bold text-white">
        Tech <span class="text-indigo-400">Stack</span>
      </h2>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (category of portfolio.skillCategories; track category.name) {
        <div class="group relative bg-slate-800/60 rounded-2xl p-6 border border-slate-700/80
                    hover:border-indigo-500/50 transition-all duration-300 hover:-translate-y-1
                    overflow-hidden">
          <!-- Top accent line -->
          <div class="absolute top-0 left-0 right-0 h-0.5 bg-linear-to-r from-indigo-500 to-purple-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

          <!-- Icon circle -->
          <div class="w-12 h-12 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-2xl mb-4 group-hover:scale-110 transition-transform duration-300">
            {{ category.icon }}
          </div>

          <h3 class="text-white font-semibold text-base mb-4">{{ category.name }}</h3>

          <div class="flex flex-wrap gap-2">
            @for (skill of category.skills; track skill) {
              <span class="px-2.5 py-1 bg-slate-900/80 text-gray-300 text-xs font-medium rounded-lg border border-slate-600/60 hover:border-indigo-500/50 hover:text-indigo-300 transition-colors cursor-default">
                {{ skill }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
